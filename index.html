<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Binance RSI 旗舰审计工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #181A20;
            --card-bg: #2B3139;
            --text-main: #EAECEF;
            --text-gray: #848E9C;
            --binance-yellow: #f0b90b;
            --up-color: #0ecb81;
            --down-color: #f6465d;
            --rsi-color: #2196F3;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        h2 { color: var(--binance-yellow); border-left: 4px solid var(--binance-yellow); padding-left: 15px; margin-bottom: 25px; }
        
        /* 交互区 */
        .controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: var(--text-gray); }
        input, select { padding: 10px; background: #1e2329; border: 1px solid #474D57; border-radius: 6px; color: white; outline: none; }
        input:focus { border-color: var(--binance-yellow); }
        
        button { align-self: flex-end; padding: 12px 24px; background: var(--binance-yellow); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #474D57; cursor: not-allowed; }

        /* 数据表格 */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #22272e; color: var(--text-gray); text-align: left; padding: 15px; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #363d47; font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.03); }
        .col-h { color: var(--up-color); font-weight: bold; }
        .col-l { color: var(--down-color); font-weight: bold; }
        .rsi-val { color: var(--rsi-color); font-weight: bold; cursor: pointer; text-decoration: underline; }

        /* 详情面板 */
        #detailPanel { margin-top: 40px; display: none; border: 1px solid var(--binance-yellow); border-radius: 12px; padding: 25px; background: #1e2329; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .pdf-btn { background: #474D57; font-size: 12px; color: white; }
        
        #stepsLog { background: #0b0e11; border-radius: 8px; padding: 20px; max-height: 500px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.6; }
        .log-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dotted #333; }
        .highlight { color: var(--binance-yellow); }
        .formula { background: #2b3139; padding: 2px 5px; border-radius: 3px; color: #dcdfe6; }

        #status { margin-bottom: 15px; padding: 10px; border-radius: 5px; font-size: 14px; }
        .success { color: var(--up-color); }
        .error { color: var(--down-color); }
    </style>
</head>
<body>

<div class="container">
    <h2>Binance RSI 旗舰审计工具</h2>
    
    <div class="controls">
        <div class="input-group">
            <label>交易对 (Symbol)</label>
            <input type="text" id="symbol" value="BTCUSDT">
        </div>
        <div class="input-group">
            <label>时间周期 (Interval)</label>
            <select id="interval">
                <option value="1m">1m</option>
                <option value="5m">5m</option>
                <option value="15m">15m</option>
                <option value="1h" selected>1h</option>
                <option value="4h">4h</option>
                <option value="1d">1d</option>
            </select>
        </div>
        <div class="input-group">
            <label>显示数量 (K-Lines)</label>
            <input type="number" id="limit" value="10" min="1" max="100">
        </div>
        <button onclick="fetchData()" id="mainBtn">生成 RSI 审计报告</button>
    </div>

    <div id="status"></div>

    <div class="table-container">
        <table id="resultTable" style="display:none;">
            <thead>
                <tr>
                    <th>时间 (Local Time)</th>
                    <th>开盘价</th>
                    <th style="color:var(--up-color)">最高价 (H)</th>
                    <th style="color:var(--down-color)">最低价 (L)</th>
                    <th>收盘价 (C)</th>
                    <th style="color:var(--rsi-color)">RSI (14) - 点击审计</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="detailPanel">
        <div class="panel-header">
            <div>
                <h3 style="margin:0">📝 计算路径深度审计</h3>
                <small id="auditInfo" style="color:var(--text-gray)"></small>
            </div>
            <button class="pdf-btn" onclick="downloadPDF()">⬇ 下载 PDF 审计报告</button>
        </div>
        <div id="stepsLog"></div>
    </div>
</div>

<script>
    let globalData = [];
    let calcLogs = [];
    const LOOKBACK = 200; // 核心：200 根回溯平滑，确保精准

    async function fetchData() {
        const btn = document.getElementById('mainBtn');
        const symbol = document.getElementById('symbol').value.toUpperCase();
        const interval = document.getElementById('interval').value;
        const limit = parseInt(document.getElementById('limit').value);
        
        btn.disabled = true;
        btn.innerText = "正在获取深度数据...";
        document.getElementById('status').className = "";
        document.getElementById('status').innerText = "⏳ 正在连接 Binance API 并追溯历史平滑值...";

        try {
            // 请求 limit + 200 根数据
            const response = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit + LOOKBACK}`);
            const data = await response.json();
            
            if (data.code) throw new Error(data.msg);

            globalData = data;
            const rsiResults = runFullRSIAlgorithm(data, 14);
            
            renderTable(data, rsiResults, limit);
            document.getElementById('status').className = "success";
            document.getElementById('status').innerText = `✅ 审计完成：基于 ${data.length} 根 K 线成功计算。点击下方 RSI 数值查看该点的完整平滑路径。`;
        } catch (e) {
            document.getElementById('status').className = "error";
            document.getElementById('status').innerText = "❌ 错误: " + e.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "生成 RSI 审计报告";
        }
    }

    function runFullRSIAlgorithm(data, period) {
        let closes = data.map(d => parseFloat(d[4]));
        let rsi = new Array(data.length).fill(null);
        calcLogs = [];
        
        let avgGain = 0;
        let avgLoss = 0;

        for (let i = 0; i < data.length; i++) {
            let log = {
                idx: i,
                time: new Date(data[i][0]).toLocaleString(),
                close: closes[i],
                detail: ""
            };

            if (i > 0) {
                let change = closes[i] - closes[i-1];
                let gain = Math.max(0, change);
                let loss = Math.max(0, -change);

                if (i <= period) {
                    avgGain += gain;
                    avgLoss += loss;
                    if (i === period) {
                        avgGain /= period;
                        avgLoss /= period;
                        log.detail = `[初始值阶段] 计算前 ${period} 个周期的简单平均涨跌。AvgGain: ${avgGain.toFixed(6)}, AvgLoss: ${avgLoss.toFixed(6)}`;
                    } else {
                        log.detail = `[热身阶段] 累计涨跌数据中... (${i}/${period})`;
                    }
                } else {
                    // Wilder's Smoothing 递归
                    avgGain = (avgGain * (period - 1) + gain) / period;
                    avgLoss = (avgLoss * (period - 1) + loss) / period;
                    log.detail = `[平滑递进] 使用威尔德平滑公式: NewAvg = (PrevAvg * 13 + Today) / 14<br/>` +
                                 `Gain: <span class="formula">${avgGain.toFixed(6)}</span> | Loss: <span class="formula">${avgLoss.toFixed(6)}</span>`;
                }

                if (i >= period) {
                    let rs = avgGain / (avgLoss || 0.000001);
                    rsi[i] = 100 - (100 / (1 + rs));
                    log.rsiResult = rsi[i].toFixed(4);
                }
            }
            calcLogs.push(log);
        }
        return rsi;
    }

    function renderTable(data, rsi, limit) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const displayData = data.slice(-limit);
        const displayRSI = rsi.slice(-limit);

        displayData.forEach((k, i) => {
            const actualIdx = (data.length - limit) + i;
            tbody.innerHTML += `
                <tr>
                    <td>${new Date(k[0]).toLocaleString()}</td>
                    <td>${k[1]}</td>
                    <td class="col-h">${k[2]}</td>
                    <td class="col-l">${k[3]}</td>
                    <td>${k[4]}</td>
                    <td><span class="rsi-val" onclick="showAudit(${actualIdx})">${displayRSI[i].toFixed(2)}</span></td>
                </tr>
            `;
        });
        document.getElementById('resultTable').style.display = "table";
    }

    function showAudit(idx) {
        document.getElementById('detailPanel').style.display = "block";
        const entry = calcLogs[idx];
        document.getElementById('auditInfo').innerText = `审计标的: ${document.getElementById('symbol').value} | 周期点: ${entry.time}`;
        
        let logContainer = document.getElementById('stepsLog');
        logContainer.innerHTML = `<div class="log-item" style="background:#3c2f01; padding:15px; border-radius:5px;">
            <strong class="highlight">🎯 最终审计目标</strong><br/>
            时间: ${entry.time}<br/>
            收盘价: ${entry.close}<br/>
            <strong>最终算出的 RSI: <span style="font-size:18px; color:var(--rsi-color)">${entry.rsiResult}</span></strong>
        </div>`;

        // 溯源最后 30 步（避免 PDF 过长，但保留关键平滑逻辑）
        logContainer.innerHTML += `<h4>📉 平滑路径溯源 (展示最近 30 步):</h4>`;
        for (let i = idx; i >= Math.max(0, idx - 30); i--) {
            const item = calcLogs[i];
            logContainer.innerHTML += `
                <div class="log-item">
                    <span style="color:var(--text-gray)">[T-${idx-i}] ${item.time}</span><br/>
                    ${item.detail || "初始数据参考"}<br/>
                    ${item.rsiResult ? `阶段性 RSI 数值: <span class="highlight">${item.rsiResult}</span>` : ""}
                </div>
            `;
        }
        logContainer.scrollTop = 0;
    }

    function downloadPDF() {
        const element = document.getElementById('detailPanel');
        const symbol = document.getElementById('symbol').value;
        const opt = {
            margin: 10,
            filename: `Binance_RSI_Audit_${symbol}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, backgroundColor: '#1e2329', useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
