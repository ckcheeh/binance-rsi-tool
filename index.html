<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Binance RSI 旗舰审计工具 - 修复版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #181A20; --card: #2B3139; --yellow: #f0b90b; --text: #EAECEF; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #474D57; background: #1e2329; color: white; }
        button { background: var(--yellow); color: #000; font-weight: bold; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #474D57; padding: 12px; text-align: left; }
        .rsi-val { color: #2196F3; cursor: pointer; text-decoration: underline; font-weight: bold; }
        
        /* 详情面板样式 */
        #detailPanel { margin-top: 30px; display: none; border: 1px solid var(--yellow); padding: 20px; border-radius: 8px; }
        #stepsLog { background: #0b0e11; padding: 15px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 13px; line-height: 1.5; }
        .pdf-btn { background: #474D57; color: white; margin-left: 10px; }
        
        /* 专门给 PDF 打印用的隐藏区域（白色背景，确保清晰） */
        #pdf-export-area { display: none; background: white; color: black; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Binance RSI 旗舰审计工具</h2>
    <div class="controls">
        <input type="text" id="symbol" value="AAVEUSDT">
        <select id="interval">
            <option value="1h" selected>1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
        </select>
        <input type="number" id="limit" value="10">
        <button onclick="fetchData()">生成报告</button>
    </div>

    <div id="status"></div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>时间 (Local)</th><th>开盘</th><th>最高</th><th>最低</th><th>收盘</th><th>RSI(14) - 点击审计</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="detailPanel">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 id="auditTitle">计算审计</h3>
            <button class="pdf-btn" onclick="downloadPDF()">⬇ 下载 PDF 报告</button>
        </div>
        <div id="stepsLog"></div>
    </div>
</div>

<div id="pdf-export-area"></div>

<script>
    let calcLogs = [];
    const LOOKBACK = 200;

    async function fetchData() {
        const symbol = document.getElementById('symbol').value.toUpperCase();
        const interval = document.getElementById('interval').value;
        const limit = parseInt(document.getElementById('limit').value);
        
        try {
            const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit + LOOKBACK}`);
            const data = await res.json();
            const rsi = runRSI(data, 14);
            render(data, rsi, limit);
        } catch (e) { alert(e.message); }
    }

    function runRSI(data, p) {
        let closes = data.map(d => parseFloat(d[4]));
        let rsi = new Array(data.length).fill(null);
        calcLogs = [];
        let gA = 0, lA = 0;

        for (let i = 0; i < data.length; i++) {
            let log = { time: new Date(data[i][0]).toLocaleString(), close: closes[i], info: "" };
            if (i > 0) {
                let d = closes[i] - closes[i-1];
                let g = Math.max(0, d), l = Math.max(0, -d);
                if (i <= p) {
                    gA += g; lA += l;
                    if (i === p) { gA /= p; lA /= p; }
                } else {
                    gA = (gA * (p-1) + g) / p;
                    lA = (lA * (p-1) + l) / p;
                }
                if (i >= p) {
                    rsi[i] = 100 - (100 / (1 + (gA / (lA || 0.0001))));
                    log.info = `AvgGain: ${gA.toFixed(6)} | AvgLoss: ${lA.toFixed(6)} | RSI: ${rsi[i].toFixed(4)}`;
                }
            }
            calcLogs.push(log);
        }
        return rsi;
    }

    function render(data, rsi, limit) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        data.slice(-limit).forEach((k, i) => {
            const idx = (data.length - limit) + i;
            tbody.innerHTML += `<tr>
                <td>${new Date(k[0]).toLocaleString()}</td>
                <td>${k[1]}</td><td>${k[2]}</td><td>${k[3]}</td><td>${k[4]}</td>
                <td><span class="rsi-val" onclick="showAudit(${idx})">${rsi[idx].toFixed(2)}</span></td>
            </tr>`;
        });
        document.getElementById('resultTable').style.display = "table";
    }

    function showAudit(idx) {
        const logBox = document.getElementById('stepsLog');
        const exportArea = document.getElementById('pdf-export-area');
        let html = `<strong>审计点: ${calcLogs[idx].time} | 最终值: ${calcLogs[idx].info}</strong><hr>`;
        
        // 追溯 30 步
        for (let i = idx; i >= Math.max(0, idx - 30); i--) {
            html += `<div style="margin-bottom:8px;">[${calcLogs[i].time}] - ${calcLogs[i].info || "初始化"}</div>`;
        }
        
        logBox.innerHTML = html;
        exportArea.innerHTML = `<h1>RSI 审计报告</h1>` + html; // 同步到 PDF 区域
        document.getElementById('detailPanel').style.display = "block";
    }

    function downloadPDF() {
        const element = document.getElementById('pdf-export-area');
        element.style.display = 'block'; // 临时显示用于抓取
        
        const opt = {
            margin: 15,
            filename: `RSI_Report_${document.getElementById('symbol').value}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none'; // 抓取完后重新隐藏
        });
    }
</script>
</body>
</html>
